<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 9</title>

  <style>
    button {
      margin: 3px;
    }

    button:hover {
      cursor: pointer;
    }

    #first-num,
    #second-num {
      width: 60px;
    }

    output {
      border: 1px solid gray;
      display: block;
      height: 18px;
      margin-top: 5px;
      padding: 5px;
      width: 240px;
    }

    main {
      width: 800px;
    }

    #error-btns {
      column-gap: 5px;
      display: flex;
      flex-wrap: wrap;
      margin-top: 30px;
      row-gap: 5px;
    }

    #error-btns>* {
      padding: 8px 2px;
      width: 122px;
    }
  </style>
</head>

<body>
  <main>
    <form>
      <fieldset>
        <legend>Error Calculator</legend>
        <input name="first-num" id="first-num" />
        <select name="operator" id="operator">
          <option>+</option>
          <option>-</option>
          <option>*</option>
          <option>/</option>
        </select>
        <input name="second-num" id="second-num" />
        <button id="calculate">Calculate</button>
        <br />
        <output></output>
      </fieldset>
    </form>

    <section id="error-btns">
      <button>Console Log</button>
      <button>Console Error</button>
      <button>Console Count</button>
      <button>Console Warn</button>
      <button>Console Assert</button>
      <button>Console Clear</button>
      <button>Console Dir</button>
      <button>Console dirxml</button>
      <button>Console Group Start</button>
      <button>Console Group End</button>
      <button>Console Table</button>
      <button>Start Timer</button>
      <button>End Timer</button>
      <button>Console Trace</button>
      <button>Trigger a Global Error</button>
    </section>
  </main>
<script src="https://cdn.trackjs.com/agent/v3/latest/t.js"></script>
<script>
  window.TrackJS && TrackJS.install({ 
    token: "d9a867a396bc448a8231ce94672b2b74"
    // for more configuration options, see https://docs.trackjs.com
  });
</script>
<script>
    // 1. Custom Error Classes (Defined at the top scope)
    class ValidationError extends Error {
      constructor(message) {
        super(message);
        this.name = "ValidationError";
      }
    }

    class DivisionByZeroError extends Error {
      constructor(message = "Cannot divide a number by zero.") {
        super(message);
        this.name = "DivisionByZeroError";
      }
    }

    //Form Submission & Calculator Logic
    let form = document.querySelector('form');
    form.addEventListener('submit', e => {
      e.preventDefault();
      
      let output = document.querySelector('output');
      let firstNum = document.querySelector('#first-num').value;
      let secondNum = document.querySelector('#second-num').value;
      let operator = document.querySelector('#operator').value;

      // Wrap validation and math execution in the try/catch block
      try {
        // Validate input presence
        if (!firstNum.trim() || !secondNum.trim()) {
          throw new ValidationError("Both input fields must have a value.");
        }
        
        // Validate if inputs are actual numbers
        if (isNaN(firstNum) || isNaN(secondNum)) {
          throw new ValidationError("Inputs must be numeric values.");
        }

        // Check for division by zero
        if (operator === '/' && Number(secondNum) === 0) {
          throw new DivisionByZeroError();
        }

        // If validation passes, evaluate the math safely
        output.innerHTML = eval(`${firstNum} ${operator} ${secondNum}`);

      } catch (err) {
        // Handle our custom errors or unexpected errors gracefully
        if (err instanceof ValidationError || err instanceof DivisionByZeroError) {
          console.error(`[Calculation Error] ${err.name}: ${err.message}`);
          output.innerHTML = ` Error: ${err.message}`;
        } else {
          console.error("An unexpected error occurred:", err);
          output.innerHTML = " An unexpected error occurred.";
        }
      } finally {
        console.log("Calculation attempt finished.");
      }
    });

    //Button Testing Console Utilities
    let errorBtns = Array.from(document.querySelectorAll('#error-btns > button'));

    errorBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const action = btn.textContent.trim();

        switch (action) {
          case 'Console Log':
            console.log('This is a standard console.log message.');
            break;
          case 'Console Error':
            console.error('This is a simulated console.error alert!');
            break;
          case 'Console Count':
            console.count('Count Button Pressed');
            break;
          case 'Console Warn':
            console.warn('This is a console.warn warning message.');
            break;
          case 'Console Assert':
            const x = 5;
            const y = 10;
            console.assert(x === y, `Assertion failed: ${x} does not equal ${y}`);
            break;
          case 'Console Clear':
            console.clear();
            break;
          case 'Console Dir':
            console.dir(document.querySelector('form'));
            break;
          case 'Console dirxml':
            console.dirxml(document.querySelector('form'));
            break;
          case 'Console Group Start':
            console.group('Interactive Log Group');
            console.log('Inside the group: Step 1');
            console.log('Inside the group: Step 2');
            break;
          case 'Console Group End':
            console.groupEnd();
            console.log('Logged outside of the group.');
            break;
          case 'Console Table':
            const courses = [
              { name: 'CSE 110', type: 'Software Engineering' },
              { name: 'CSE 100', type: 'Advanced Data Structures' },
              { name: 'CSE 101', type: 'Algorithms' }
            ];
            console.table(courses);
            break;
          case 'Start Timer':
            console.time('Timer Demo');
            console.log('Timer started...');
            break;
          case 'End Timer':
            console.timeEnd('Timer Demo');
            break;
          case 'Console Trace':
            const deepFunction = () => { deeperFunction(); };
            const deeperFunction = () => { console.trace('Trace log context:'); };
            deepFunction();
            break;
          case 'Trigger a Global Error':
            // Intentionally calling an undefined function to break global scope
            callUndefinedGlobalFunction();
            break;
        }
      });
    });

    //4. Global Error Handler
    window.onerror = function (message, source, lineno, colno, error) {
      console.log(`Global Error Caught! Message: ${message} at ${source}:${lineno}:${colno}`);
      
      // Returning true prevents the default browser error logging firing on top of this log
      // This ensures your custom logging and TrackJS catch it cleanly
      return false; 
    };
  </script>
</body>
</html>
